name: Zentory CI

on:
  push:
  pull_request:
  workflow_dispatch:

# NOTE: This repo (zentory-protocol) is the public contracts repo. The engine
# (Python) and dApp frontend (Next.js) live in separate repos
# (zentory-engine, zentory-app) with their own CI. The old monorepo
# `engine` and `frontend` jobs were removed after the repo split — they
# referenced working directories that don't exist here and failed on every
# push. The cross-language signer parity test in the Foundry job auto-skips
# when the (gitignored / separate-repo) engine signer is absent.

env:
  FOUNDRY_PROFILE: ci
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge build
        run: forge build --sizes

      - name: Forge unit tests
        run: |
          forge test -q || (echo "forge test -q failed; rerunning verbose" && forge test -vvv)

      - name: Forge invariants
        run: forge test --match-path "test/invariants/**" -q

  slither:
    name: Contracts (Slither)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: python -m pip install --upgrade pip slither-analyzer

      # Slither is advisory — it never blocks CI. The analysis runs with
      # continue-on-error and the report upload tolerates a missing file so a
      # Slither crash or unsupported-feature error cannot turn the pipeline red.
      - name: Run Slither (JSON report)
        continue-on-error: true
        run: |
          mkdir -p ../docs/reports
          slither . --exclude-dependencies --filter-paths "lib" --json ../docs/reports/slither-ci.json || true

      - name: Upload Slither report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: docs/reports/slither-ci.json
          if-no-files-found: ignore
