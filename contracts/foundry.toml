[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = true
fuzz.runs = 256
fuzz.max_test_rejects = 65536
# Allow read access to the (gitignored / separate-repo) engine dir so the
# cross-language ffi parity test can detect whether the Python signer is
# present and vm.skip() when it isn't (e.g. in the public-repo CI checkout).
fs_permissions = [{ access = "read", path = "../engine" }]
# Increase gas limit for complex deployment transactions
block_gas_limit = 30000000

[profile.ci]
fuzz.runs = 1000
# CI inherits via_ir = true from [profile.default]. We deliberately do NOT
# override it to false here: production deploys use via_ir = true, so CI must
# compile the same bytecode. The earlier via_ir = false workaround (for an old
# EpochScoring IR stack-too-deep, since resolved) caused the OPPOSITE problem —
# legacy codegen hit stack-too-deep in StrategyExecutor.executeSignal once the
# leverage + low-s checks were added. Keep CI on the IR pipeline.

# ─── Chain RPC URLs ─────────────────────────────────────────────────────────
# HyperEVM Testnet (Hyperliquid Blaze Testnet)
[rpc_endpoints]
hyperEVMTestnet = "${HYPEREVM_TESTNET_RPC_URL}"
# HyperEVM Mainnet
hyperEVM = "${HYPEREVM_MAINNET_RPC_URL}"
# Ethereum Sepolia (testnet)
sepolia = "${SEPOLIA_RPC_URL}"
# Ethereum Mainnet
mainnet = "${MAINNET_RPC_URL}"
# Base Mainnet
base = "${BASE_RPC_URL}"
# Base Sepolia
baseSepolia = "${BASE_SEPOLIA_RPC_URL}"

# ─── Etherscan / Blockscout Verification ────────────────────────────────────
# API keys should be set in environment variables:
#   ETHERSCAN_API_KEY    — for Ethereum/Base Sepolia
#   BASESCAN_API_KEY     — for Base Mainnet verification
#   HYPEREVM_API_KEY     — for HyperEVM verification (if supported)

[etherscan]
hyperEVMTestnet = { key = "${HYPEREVM_EXPLORER_API_KEY}", url = "${HYPEREVM_EXPLORER_URL}" }
hyperEVM        = { key = "${HYPEREVM_EXPLORER_API_KEY}", url = "${HYPEREVM_EXPLORER_URL}" }
sepolia         = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
mainnet         = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/api" }
baseSepolia     = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base            = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
