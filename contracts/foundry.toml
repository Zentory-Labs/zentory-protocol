[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = true
fuzz.runs = 256
fuzz.max_test_rejects = 65536
# Increase gas limit for complex deployment transactions
block_gas_limit = 30000000

[profile.ci]
fuzz.runs = 1000

# ─── Chain RPC URLs ─────────────────────────────────────────────────────────
# HyperEVM Testnet (Hyperliquid Blaze Testnet)
[rpc_endpoints]
hyperEVMTestnet = "${HYPEREVM_TESTNET_RPC_URL}"
# HyperEVM Mainnet
hyperEVM = "${HYPEREVM_MAINNET_RPC_URL}"
# Ethereum Sepolia (testnet)
sepolia = "${SEPOLIA_RPC_URL}"
# Ethereum Mainnet
mainnet = "${MAINNET_RPC_URL}"
# Base Mainnet
base = "${BASE_RPC_URL}"
# Base Sepolia
baseSepolia = "${BASE_SEPOLIA_RPC_URL}"

# ─── Etherscan / Blockscout Verification ────────────────────────────────────
# API keys should be set in environment variables:
#   ETHERSCAN_API_KEY    — for Ethereum/Base Sepolia
#   BASESCAN_API_KEY     — for Base Mainnet verification
#   HYPEREVM_API_KEY     — for HyperEVM verification (if supported)

[etherscan]
hyperEVMTestnet = { key = "${HYPEREVM_EXPLORER_API_KEY}", url = "${HYPEREVM_EXPLORER_URL}" }
hyperEVM        = { key = "${HYPEREVM_EXPLORER_API_KEY}", url = "${HYPEREVM_EXPLORER_URL}" }
sepolia         = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
mainnet         = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/api" }
baseSepolia     = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base            = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
